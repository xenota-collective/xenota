description = """
Landing workflow for submodule-backed feature stacks.

Use this when a feature spans a submodule repo (for example `xenon`) and a
top-level repo pointer update (for example `xenota`). This workflow makes one
agent responsible for the entire landing unit:

1. Verify the implementation stack is actually ready to land
2. Execute the manual testing plan against the submodule work
3. Refresh the top-level pointer branch against the reviewed submodule branch set
4. Run final automated and manual integration testing from the top-level repo
5. Make the top-level PR the ready-to-merge landing unit
6. Prepare handbook updates so docs reflect the now-ready landing unit
7. Initiate human review of handbook + code
8. Only then merge the submodule PR set and immediately update/finalize the top-level PR
9. Post one final landing summary back on the epic/bead

This workflow is for landing, not original implementation.

## Rules

- Do not merge submodule PRs to `main` until the top-level landing PR is ready to merge.
- Do not treat submodule test success as equivalent to top-level integration success.
- If manual testing fails at any stage, stop and push the issue back to the
  implementation track with concrete findings.
- Record evidence on the landing bead and final summary on the parent epic.
- Land through PRs; do not push `main` directly unless the repo's approved
  merge path explicitly requires it.
- Keep the submodule PR set and the top-level PR as one coordinated landing unit.
- After the top-level PR is ready, prepare handbook updates through the
  `update-handbook` workflow or equivalent local handbook process.
- Do not silently edit handbook content; prepare proposals/diffs and initiate
  human review so the human can review handbook and code together.
- Before human review, update the epic bead with a concise human manual-testing
  checklist so the human can personally verify correctness without reverse-
  engineering the implementation.
"""
formula = "land-submodule-stack"
version = 1

[[steps]]
id = "intake"
title = "Resolve landing stack and required gates"
description = """
Read the landing bead and parent epic, then build the explicit landing stack.

Capture:
- parent epic / target feature
- submodule repo(s) involved
- submodule PRs to merge
- top-level PR(s) carrying submodule pointer updates
- opposite-flavor code review gate(s)
- manual testing plan location

Fail immediately if the stack is ambiguous.

Before closing this step, add notes listing:
- submodule PR URLs
- top-level PR URLs
- review gate bead(s)
- manual testing plan source
"""

[[steps]]
id = "verify-gates"
title = "Verify implementation and review gates are satisfied"
needs = ["intake"]
description = """
Verify the stack is ready for landing.

Required checks:
- implementation PRs exist and are current
- required code reviews are complete
- manual testing plan exists on the epic/bead
- any open review findings are either fixed or explicitly accepted as followup

If a review gate is still active or findings remain unresolved:
- stop
- document the unresolved gate
- nudge the implementation owner

Before closing this step, add notes showing each gate and its state.
"""

[[steps]]
id = "manual-submodule"
title = "Execute manual testing plan on submodule feature work"
needs = ["verify-gates"]
description = """
Run the documented manual testing plan against the submodule feature work.

Rules:
- execute the plan in practice; do not just restate it
- use the feature branches / PR heads specified in the landing stack
- record exact commands, environment, pass/fail results, and deviations
- separate what was executed from what remains untestable before later integration

If the manual plan exposes defects:
- stop landing
- document findings on the parent epic and landing bead
- send the work back to implementation

Before closing this step, add notes with concrete manual test evidence.
"""

[[steps]]
id = "refresh-top"
title = "Refresh top-level pointer branch and PR before landing"
needs = ["manual-submodule"]
description = """
Rebuild or refresh the top-level branch from top-level `origin/main` so it
contains only the intended submodule pointer update and landing summary changes.

Important: this step happens before the submodule PRs merge to `main`.
The goal is to make the top-level PR reviewable and integration-testable against
the exact reviewed submodule branch set.

Rules:
- do not inherit unrelated local commits
- point the submodule checkout at the reviewed submodule branch/commit set
- update the top-level PR description to reflect the pending submodule stack

Before closing this step, add notes with:
- clean top-level branch name
- updated submodule pointer commit(s)
- top-level PR URL
"""

[[steps]]
id = "manual-integration"
title = "Run final top-level automated and manual integration testing"
needs = ["refresh-top"]
description = """
Run final manual integration testing from the top-level repo with the refreshed
submodule pointer.

This is not a repeat of submodule testing. Focus on:
- the feature as consumed by the parent repo
- top-level wiring
- operator-visible integration behavior
- regressions introduced by the merged submodule state

Also run the top-level automated validation that should gate the final PR.

If integration testing fails:
- stop
- document exact failures
- file or update followup beads

Before closing this step, add notes with automated checks, manual commands run,
pass/fail, and residual risks.
"""

[[steps]]
id = "stage-final-pr"
title = "Stage final top-level PR as the merge-ready landing unit"
needs = ["manual-integration"]
description = """
Update or create the final top-level PR as the single human review surface for
the landing unit.

The final PR summary must include:
- submodule PRs that are queued for merge
- submodule PRs merged
- merged submodule commit(s)
- manual submodule test results
- final top-level integration results
- residual risks / deferred work

This step is complete only when the top-level PR is truly ready to merge once
the submodule PR set lands.

Before closing this step, add notes with the final top-level PR URL and summary bullets.
"""

[[steps]]
id = "handbook"
title = "Prepare handbook update proposals for the landing unit"
needs = ["stage-final-pr"]
description = """
Once the top-level PR is merge-ready, prepare handbook updates so documentation
reflects the new reality that will exist after merge.

Use the existing handbook workflow rather than improvising. Preferred path:
- `update-handbook` formula

Rules:
- do not silently edit handbook docs
- identify which handbook docs must change to reflect the landing unit
- prepare exact proposed handbook changes or diffs
- keep technical docs aligned to implemented/current reality only
- if behavior is still not implemented, keep it in plans rather than technical docs

Before closing this step, add notes with:
- handbook files affected
- proposal or diff locations
- whether handbook edits were prepared or already approved
"""

[[steps]]
id = "human-test-instructions"
title = "Update epic with human manual verification instructions"
needs = ["handbook"]
description = """
Update the parent epic/bead with a concise manual verification section intended
for the human reviewer.

This is different from the detailed operator manual test plan used by agents.
The goal here is to help the human quickly verify the feature is correct.

Required content:
- exact branch / PR to review
- exact setup commands the human can run
- the 3-7 highest-signal manual checks to perform
- expected outcomes for each check
- any important caveats or intentionally untestable areas

Keep it short, concrete, and human-oriented.

Before closing this step, add notes with:
- where the epic was updated
- a short summary of the human verification checklist
"""

[[steps]]
id = "human-review"
title = "Initiate human review of code and handbook"
needs = ["human-test-instructions"]
description = """
Initiate the human review gate once both are ready:
- top-level PR is ready to merge
- handbook proposals/diffs are prepared
- epic contains a concise human manual verification checklist

The purpose of this gate is to let the human review:
- the final top-level code PR
- the submodule landing summary
- the proposed handbook updates
- the manual checks they can run themselves

Do not proceed to merge until the human has been explicitly invited to review
the landing unit as a whole.

Before closing this step, add notes with:
- top-level PR URL
- handbook proposal summary
- review request message / handoff summary
"""

[[steps]]
id = "merge-submodule"
title = "Merge submodule PR stack and finalize top-level PR"
needs = ["human-review"]
description = """
Now that the top-level PR is merge-ready, land the submodule repo PR set in the
correct order and immediately finalize the top-level PR to point at the merged
submodule `main` commit(s).

Rules:
- preserve ordering when PRs stack on each other
- confirm each merged PR is actually on submodule `main`
- refresh the top-level branch immediately after the submodule merges
- do not leave the top-level PR pointing at stale pre-merge commits

Before closing this step, add notes with merged PR numbers, resulting commit
SHAs, and the refreshed top-level PR state.
"""

[[steps]]
id = "closeout"
title = "Post final landing summary and handoff"
needs = ["merge-submodule"]
description = """
Post one final summary on the parent epic/bead.

Required summary:
- what landed
- which PRs merged
- manual test outcome at submodule level
- manual integration outcome at top level
- unresolved risks or deferred items
- final top-level PR URL

Then mark the landing bead complete.
"""

[vars]
[vars.submodule_repo]
description = "Primary submodule repo name, for example xenon"
default = "xenon"

[vars.top_repo]
description = "Top-level repo name, for example xenota"
default = "xenota"

[vars.parent_epic]
description = "Parent epic/bead receiving the final landing summary"
required = true
