name: Pointer PR check

# Required-status check for xenota top-level submodule-pointer PRs (xc-6aoe).
#
# This workflow runs the xsm `pointer-pr verify` command against any PR that
# touches the `xenon` submodule. It fails closed: a missing or unreachable
# verification step counts as a fail, so a green check on this workflow is
# the gate that proves the referenced xenon commit is on origin/main, that
# its CI was green, and (for security/control-plane labels) that a strong
# review receipt was recorded.
#
# To enforce this end-to-end, the `pointer-check` job must be added to the
# repo's branch-protection required checks for main. Until that branch
# protection is wired, a failing job here still surfaces in the PR's
# statusCheckRollup so xsm landing automation can refuse the merge.

on:
  pull_request:
    branches: [main]
    paths:
      - 'xenon'
      - '.gitmodules'
      - '.github/workflows/pointer-pr-check.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  pointer-check:
    name: pointer-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xenota
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Checkout xenon submodule
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
            "git@github.com:"
          git submodule sync xenon
          git submodule update --init xenon

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install xsm package
        working-directory: xenon/packages/xsm
        run: uv sync

      - name: Run pointer-pr verifier
        working-directory: xenon/packages/xsm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run xsm pointer-pr verify \
            --pr "${{ github.event.pull_request.number }}" \
            --xenon-repo "${{ github.repository_owner }}/xenon" \
            --json
