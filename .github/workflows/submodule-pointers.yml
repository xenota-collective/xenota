name: submodule pointers

# Pre-merge gate that rejects xenota PRs whose recorded submodule SHA is not
# reachable from that submodule's `origin/main` (e.g. a PR-head SHA that will
# be a different commit after the submodule PR squash-merges, or an unmerged
# branch tip).
#
# Auth: cloning + fetching xenon and handbook from a xenota workflow run
# requires a cross-repo read token. The default `GITHUB_TOKEN` is scoped to
# the workflow's own repo and the submodule clone fails with "Repository not
# found". Add a `SUBMODULE_READ_TOKEN` repository secret holding a fine-
# grained PAT (or GitHub App installation token) with `Contents: read` on
# xenota-collective/xenon and xenota-collective/handbook to enable the gate.

on:
  pull_request:
    branches: [main]
    paths:
      - 'xenon'
      - 'handbook'
      - '.gitmodules'
      - 'scripts/check-submodule-pointers.sh'
      - '.github/workflows/submodule-pointers.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-pointers:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite SSH submodule URLs to HTTPS for CI
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Fetch submodule main branches
        run: |
          set -euo pipefail
          while IFS= read -r path; do
            if [[ -d "$path/.git" || -f "$path/.git" ]]; then
              echo "Fetching origin/main inside $path"
              git -C "$path" fetch --depth=200 origin main
            fi
          done < <(git config --file .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')

      - name: Verify submodule pointers
        env:
          SUBMODULE_POINTER_SKIP_FETCH: '1'
        run: bash scripts/check-submodule-pointers.sh
